<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Minecraft</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #controls { position: absolute; top: 15px; left: 15px; z-index: 10; display: flex; gap: 10px; align-items: center; }
        select { background: #222; color: #fff; border: 2px solid #444; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; outline: none; }
        select:hover { border-color: #666; }
        iframe { width: 100vw; height: 100vh; border: none; }
        .warning { color: #aaa; font-size: 12px; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>

    <div id="controls">
        <select id="versionSelect" onchange="changeVersion()">
            <!-- Using direct client links that allow iframing -->
            <option value="https://q130.org">Minecraft 1.8.8</option>
            <option value="https://eaglercraft.com">Minecraft 1.5.2</option>
            <option value="https://vercel.app">Minecraft 1.12.2 (Precision)</option>
        </select>
        <span class="warning">Click the game area if keys don't work!</span>
    </div>

    <!-- The iframe must have allow attributes for fullscreen and pointer lock -->
    <iframe id="gameFrame" 
            src="https://q130.org" 
            allow="autoplay; fullscreen; pointer-lock;">
    </iframe>

    <script>
        function changeVersion() {
            const select = document.getElementById('versionSelect');
            const frame = document.getElementById('gameFrame');
            frame.src = select.value;
            // Refocus the frame so controls work immediately
            frame.focus();
        }
    </script>
</body>
</html>
